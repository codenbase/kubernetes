services:
  app:
    build: .
    container_name: stress-app
    ports:
      - "8080:8080"
    environment:
      # Use localhost explicitly here since Postgres and App are in the same container
      - DSN=host=127.0.0.1 user=stressuser password=stresspassword dbname=stresslab port=5432 sslmode=disable TimeZone=Asia/Shanghai
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: "4G"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/login"]
      interval: 10s
      timeout: 5s
      retries: 5

  k6-loadtest:
    image: grafana/k6:latest
    container_name: k6-loadtest
    volumes:
      - ./loadtest:/loadtest
    depends_on:
      app:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: "2G"
    entrypoint: ["tail", "-f", "/dev/null"]
