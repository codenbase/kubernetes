apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: web-demo-ingress
  annotations:
    # 假设使用 nginx ingress controller
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: nginx
  rules:
    - host: demo.local
      http:
        paths:
          - pathType: Prefix
            path: /api
            backend:
              service:
                name: backend
                port:
                  number: 8080
          - pathType: Prefix
            path: /
            backend:
              service:
                name: frontend
                port:
                  number: 80
