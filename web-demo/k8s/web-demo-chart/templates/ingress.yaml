{{- if .Values.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-ingress
  namespace: {{ .Release.Namespace }}
  annotations:
    # 【高能预警：条件渲染注解】
    # 意思是：如果 sslRedirect 是 false 的话（注意那个 not），就强行关闭 HTTPS 重定向
    {{- if not .Values.ingress.sslRedirect }}
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - host: {{ .Values.ingress.host | quote }} # 动态读取你的 dawn.io
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                # 精准路由到刚刚生成的后端 Service
                name: {{ .Release.Name }}-backend-svc
                port:
                  number: 80
          - path: /
            pathType: Prefix
            backend:
              service:
                # 精准路由到前端 Service
                name: {{ .Release.Name }}-frontend-svc
                port:
                  number: 80
{{- end }}