name: Web-Demo CI Pipeline

on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main" ]
  workflow_dispatch: 

jobs:
  test:
    name: Code Quality & Unit Tests
    runs-on: ubuntu-latest 
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5
      - name: Setup Go Environment
        uses: actions/setup-go@v5
        with:
          go-version: '1.25' 
      - name: Run Go Vet
        run: |
          cd web-demo/backend
          go vet ./...
      - name: Run Unit Tests
        run: |
          cd web-demo/backend
          go test -v ./...