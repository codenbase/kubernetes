name: Web-Demo CI/CD Pipeline

on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # 声明前后端两个镜像的名字
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/web-demo-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/web-demo-frontend

jobs:
  # ==========================================
  # 阶段一：质检防御网
  # ==========================================
  test:
    name: Code Quality & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Setup Go Environment
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          # 【注意路径变更】：同步修改为 web-demo/backend
          cache-dependency-path: web-demo/backend/go.sum

      - name: Run Go Vet
        run: |
          cd web-demo/backend
          go vet ./...

      - name: Run Unit Tests
        run: |
          cd web-demo/backend
          go test -v ./...

  # ==========================================
  # 阶段二：前后端双轨制造与推送
  # ==========================================
  build-and-push:
    name: Build & Push Docker Images
    needs: test
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ------------------------------------------
      # 🎯 制造后端镜像
      # ------------------------------------------
      - name: Extract Backend metadata
        id: meta-backend  # 【隔离ID】：防止变量被前端覆盖
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.BACKEND_IMAGE }}
          tags: |
            type=sha,prefix=gha-${{ github.run_number }}-
            type=raw,value=latest

      - name: Build and push Backend Image
        uses: docker/build-push-action@v7
        with:
          context: ./web-demo/backend
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}

      # ------------------------------------------
      # 🎯 制造前端镜像
      # ------------------------------------------
      - name: Extract Frontend metadata
        id: meta-frontend # 【隔离ID】：专属前端的变量
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.FRONTEND_IMAGE }}
          tags: |
            type=sha,prefix=gha-${{ github.run_number }}-
            type=raw,value=latest

      - name: Build and push Frontend Image
        uses: docker/build-push-action@v7
        with:
          context: ./web-demo/frontend
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}