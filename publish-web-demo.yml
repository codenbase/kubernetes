name: Publish web-demo to GHCR

# 触发条件：当你推送到 main 分支且更新了 web-demo 目录下的文件时
on:
  push:
    branches: [ main ]
    paths:
      - 'web-demo/**'
  # 允许在 GitHub Actions 页面上手动触发
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # 镜像名称会以代码库的 Owner (或 Organization) 为前缀
  BACKEND_IMAGE_NAME: ${{ github.repository_owner }}/web-demo-backend
  FRONTEND_IMAGE_NAME: ${{ github.repository_owner }}/web-demo-frontend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    # 给 GITHUB_TOKEN 赋予推送 packages (即 GHCR 镜像) 的权限
    permissions:
      contents: read
      packages: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 登录到 GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 构建并推送 Backend 镜像
        uses: docker/build-push-action@v5
        with:
          context: web-demo/backend
          push: true
          # 自动打上 latest 标签
          tags: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE_NAME }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: 构建并推送 Frontend 镜像
        uses: docker/build-push-action@v5
        with:
          context: web-demo/frontend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE_NAME }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
